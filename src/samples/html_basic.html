<!doctype html>
<html lang="en">
  <!-- Định nghĩa phạm vi của văn bản HTML -->
  <head>
    <!-- Định nghĩa các mô tả về trang HTML. Thông tin trong tag này không được hiển thị trên trang web -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <!-- Tiêu đề trang web -->
  </head>
  <body
    style="
      background-image: url(&quot;https://d28clw9klscyzj.cloudfront.net/legacy/assets/2016-01-31/files/1045.jpg&quot;);
      background-repeat: no-repeat;
      background-size: cover;
    "
  >
    <!-- vùng thân của trang web -->
    <!-- CÁC TAG CƠ BẢN TRONG HTML -->
    <!-- Các thẻ định dạng khối văn bản -->
    <h1>Tiêu đề H1</h1>
    <h2>Tiêu đề H2</h2>
    <h3>Tiêu đề H3</h3>
    <h4>Tiêu đề H4</h4>
    <h5>Tiêu đề H5</h5>
    <h6>Tiêu đề H6</h6>

    <p>Đoạn văn bản</p>

    <!-- Đường kẻ ngang -->
    <hr />

    <em>Đoạn văn bản in nghiêng</em> <br />
    <!-- xuống dòng -->
    <i>Đoạn văn bản in nghiêng</i>
    <b>Đoạn văn bản in đậm</b>
    <font>Đoạn văn bản với font cụ thể</font>
    <a href="https://www.google.com">Link đến Google</a>
  </body>
</html>
